<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1C1C1E; margin: 0; }
  .container {
    width: 720px;
    height: 480px;
    position: relative;
    overflow: hidden;
    font-family: Inter, Arial, sans-serif;
  }
  .bg-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(28,28,30,0.85) 0%, rgba(28,28,30,0.6) 50%, rgba(28,28,30,0.85) 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 32px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #C4933F;
    margin-bottom: 6px;
  }
  .title {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
  }
  .postcode-badge {
    background: rgba(196,147,63,0.2);
    border: 1px solid #C4933F;
    border-radius: 4px;
    padding: 6px 14px;
    color: #C4933F;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 14px 12px;
    text-align: center;
  }
  .card-name {
    font-size: 13px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 6px;
  }
  .card-price {
    font-size: 16px;
    font-weight: 700;
    color: #C4933F;
    margin-bottom: 4px;
  }
  .card-type {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .source {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }
  .brand {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="container">
  <img class="bg-img" src="../public/images/where-to-live/knutsford-overview.webp" alt="">
  <div class="overlay">
    <div class="header">
      <div>
        <div class="eyebrow">Knutsford Neighbourhoods</div>
        <div class="title">Six Areas to Consider in WA16</div>
      </div>
      <div class="postcode-badge">WA16</div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="card-name">Bexton</div>
        <div class="card-price">£900k+</div>
        <div class="card-type">Premium detached</div>
      </div>
      <div class="card">
        <div class="card-name">Toft</div>
        <div class="card-price">£750k+</div>
        <div class="card-type">Rural village</div>
      </div>
      <div class="card">
        <div class="card-name">Cross Town</div>
        <div class="card-price">£500k+</div>
        <div class="card-type">Heritage centre</div>
      </div>
      <div class="card">
        <div class="card-name">St John's Wood</div>
        <div class="card-price">£450k+</div>
        <div class="card-type">Family homes</div>
      </div>
      <div class="card">
        <div class="card-name">Nether Knutsford</div>
        <div class="card-price">£350k+</div>
        <div class="card-type">Mixed housing</div>
      </div>
      <div class="card">
        <div class="card-name">Town Centre</div>
        <div class="card-price">£220k+</div>
        <div class="card-type">Apartments</div>
      </div>
    </div>
    <div class="footer">
      <div class="source">Source: Rightmove, Feb 2026</div>
      <div class="brand">movetocheshire.uk</div>
    </div>
  </div>
</div>
</body>
</html>
